name: QuantGod Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quantgod-frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Vue build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - name: Build
        run: npm run build
      - name: Responsive checker syntax
        run: node --check scripts/responsive_check.mjs
      - name: Check source-only split
        run: |
          test ! -d Dashboard
          test ! -d MQL5
          test ! -d tools
